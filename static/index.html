<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF RAG Assistant</title>
  <meta name="description" content="Semantic document retrieval and AI-powered Q&A over ingested PDFs using jina-embeddings-v3 and Gemini." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon" id="sidebar-toggle" style="cursor:pointer;" title="Toggle Sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <div>
          <span class="logo-title">HZL Annual Report</span>
          <span class="logo-sub">jina-embeddings-v3 · Gemini 2.0 Flash</span>
        </div>
      </div>
      <div class="header-badges">
        <span class="badge badge-nvidia">✦ Google Gemini</span>
        <span class="badge badge-vector">🔍 Vector + BM25+ Rerank</span>
        <div class="status-dot" id="status-dot" title="Server status"></div>
      </div>
    </div>
  </header>

  <div class="app-shell">

    <!-- ── Column 1: Sessions Sidebar ──────────────────── -->
    <aside class="sessions-sidebar" id="sessions-sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">Chats</span>
        <button id="new-chat-btn" class="new-chat-btn" title="New chat">＋ New Chat</button>
      </div>
      <div class="sessions-list" id="sessions-list">
        <!-- Session items injected here -->
      </div>
    </aside>

    <!-- ── Column 2: Chat Area ──────────────────────────── -->
    <section class="chat-column" id="chat-column">

      <!-- Empty state (shown when no session is active) -->
      <div class="chat-empty-state" id="chat-empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 80 80" fill="none">
            <circle cx="40" cy="40" r="36" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="6 4"/>
            <path d="M28 40h24M40 28v24" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round"/>
            <defs>
              <linearGradient id="grad1" x1="4" y1="4" x2="76" y2="76" gradientUnits="userSpaceOnUse">
                <stop stop-color="#818cf8"/>
                <stop offset="1" stop-color="#38bdf8"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h2>Start a new chat</h2>
        <p>Your session history is saved. Ask questions, and I'll find answers in your PDFs.</p>
        <div class="example-queries">
          <button class="example-chip" data-query="What are the key financial highlights?">Key financial highlights</button>
          <button class="example-chip" data-query="Who are the board members?">Board members</button>
          <button class="example-chip" data-query="What is the revenue trend?">Revenue trend</button>
        </div>
      </div>

      <!-- Message history (shown when session is active) -->
      <div class="chat-messages" id="chat-messages" style="display:none">
        <!-- Message rows injected here -->
      </div>

      <!-- Input area (shown when session is active) -->
      <div class="chat-input-area" id="chat-input-area" style="display:none">
        <div class="input-row">
          <div class="input-wrap" id="input-wrap">
            <textarea
              id="chat-input"
              rows="1"
              placeholder="Ask a question about your documents…"
              aria-label="Chat input"
            ></textarea>
            <span class="kbd-hint">↵ Enter</span>
          </div>
          <div class="input-controls">
            <label class="topk-label" for="topk-select">Top</label>
            <select id="topk-select" class="topk-select">
              <option value="3">3</option>
              <option value="5" selected>5</option>
              <option value="8">8</option>
              <option value="10">10</option>
            </select>
            <button id="send-btn" class="send-btn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </section>

    <!-- ── Column 3: Sources Panel ──────────────────────── -->
    <aside class="sources-column" id="sources-column">
      <div class="panel-header">
        <h2 class="panel-title">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/>
          </svg>
          Sources
        </h2>
        <span class="chunk-count" id="chunk-count">—</span>
      </div>
      <div class="chunks-list" id="chunks-list">
        <!-- Chunk cards injected here -->
      </div>
    </aside>

  </div><!-- /.app-shell -->

  <!-- Rename Modal -->
  <div class="modal-overlay" id="rename-modal" style="display:none">
    <div class="modal">
      <h3>Rename Chat</h3>
      <input type="text" id="rename-input" maxlength="80" class="rename-input" />
      <div class="modal-actions">
        <button id="rename-cancel-btn" class="modal-btn secondary">Cancel</button>
        <button id="rename-confirm-btn" class="modal-btn primary">Save</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
